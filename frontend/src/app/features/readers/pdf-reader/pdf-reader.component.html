@if (isLoading) {
<div class="loading-container">
  <p-progressSpinner></p-progressSpinner>
</div>
}

@if (!isLoading) {
<div class="pdf-reader-container" [class.dark]="isDarkTheme">

  <!-- Footer trigger zone -->
  <div class="footer-trigger-zone" [class.inactive]="footerVisible" (mouseenter)="onFooterTriggerZoneEnter()"></div>

  @if (viewerMode === 'book') {
  <!-- Header trigger zone -->
  <div class="header-trigger-zone" [class.inactive]="headerVisible" (mouseenter)="onHeaderTriggerZoneEnter()"></div>
  }

  @if (viewerMode === 'document') {
  <button class="embed-close-btn icon-btn close-btn" [title]="'readerPdf.toolbar.closePdfReader' | transloco"
    (click)="closeReader()">
    <app-reader-icon name="close" [size]="20" />
  </button>
  <div id="embedpdf-viewer"></div>
  }

  <!-- Book PDF Viewer -->
  @if (viewerMode === 'book') {
  <ngx-extended-pdf-viewer [src]="bookData" [authorization]="authorization" [textLayer]="true"
    [showHandToolButton]="true" [height]="'100%'" [theme]="isDarkTheme ? 'dark' : 'light'" [page]="page"
    [rotation]="rotation" [zoom]="zoom" [spread]="spread" [enablePrint]="canPrint" [customToolbar]="pdfToolbar"
    (pagesLoaded)="onPdfPagesLoaded($event)" (pageChange)="onPageChange($event)" (zoomChange)="onZoomChange($event)"
    (spreadChange)="onSpreadChange($event)" (annotationEditorEvent)="onAnnotationEditorEvent()">
  </ngx-extended-pdf-viewer>
  }


  <ng-template #pdfToolbar>
    <div id="toolbarViewer" class="pdf-header-toolbar" [class.chrome-hidden]="!headerVisible">
      <div class="header-left">
        <pdf-toggle-sidebar></pdf-toggle-sidebar>
        <pdf-find-button></pdf-find-button>
      </div>
      <span class="book-title">{{ bookTitle }}</span>
      <div class="header-right">
        <pdf-highlight-editor></pdf-highlight-editor>
        <pdf-text-editor></pdf-text-editor>
        <pdf-draw-editor></pdf-draw-editor>
        <div class="separator"></div>
        <pdf-zoom-toolbar></pdf-zoom-toolbar>
        <div class="separator"></div>
        <button class="icon-btn"
          [title]="isDarkTheme ? ('readerPdf.toolbar.switchToLightMode' | transloco) : ('readerPdf.toolbar.switchToDarkMode' | transloco)"
          (click)="toggleDarkTheme()">
          @if (isDarkTheme) {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2" />
            <path d="M12 20v2" />
            <path d="m4.93 4.93 1.41 1.41" />
            <path d="m17.66 17.66 1.41 1.41" />
            <path d="M2 12h2" />
            <path d="M20 12h2" />
            <path d="m6.34 17.66-1.41 1.41" />
            <path d="m19.07 4.93-1.41 1.41" />
          </svg>
          } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
          </svg>
          }
        </button>
        <button class="icon-btn" (click)="toggleFullscreen()"
          [title]="isFullscreen ? ('readerPdf.toolbar.exitFullscreen' | transloco) : ('readerPdf.toolbar.fullscreen' | transloco)">
          @if (isFullscreen) {
          <app-reader-icon name="fullscreen-exit" [size]="18" />
          } @else {
          <app-reader-icon name="fullscreen" [size]="18" />
          }
        </button>
        <div class="separator"></div>
        <pdf-toggle-secondary-toolbar></pdf-toggle-secondary-toolbar>
        <button class="icon-btn close-btn" [title]="'readerPdf.toolbar.closePdfReader' | transloco"
          (click)="closeReader()">
          <app-reader-icon name="close" [size]="20" />
        </button>
      </div>
    </div>
  </ng-template>

  <!-- Footer (shared across both viewer modes) -->
  <div class="pdf-footer" [class.visible]="footerVisible">
    <div class="page-nav-left">
      <button class="nav-btn" (click)="goToFirstPage()" [disabled]="page <= 1"
        [title]="'readerPdf.footer.firstPage' | transloco">
        <app-reader-icon name="chevron-first" [size]="16" />
      </button>
      <button class="nav-btn" (click)="goToPreviousPage()" [disabled]="page <= 1"
        [title]="'readerPdf.footer.previousPage' | transloco">
        <app-reader-icon name="chevron-left" [size]="16" />
      </button>
      <div class="page-info">
        <span class="current">{{ page }}</span>
        <span class="total"> {{ 'readerPdf.footer.of' | transloco }} {{ totalPages }}</span>
      </div>
      <button class="nav-btn" (click)="goToNextPage()" [disabled]="page >= totalPages"
        [title]="'readerPdf.footer.nextPage' | transloco">
        <app-reader-icon name="chevron-right" [size]="16" />
      </button>
      <button class="nav-btn" (click)="goToLastPage()" [disabled]="page >= totalPages"
        [title]="'readerPdf.footer.lastPage' | transloco">
        <app-reader-icon name="chevron-last" [size]="16" />
      </button>
    </div>

    <div class="page-controls">
      <div class="slider-wrapper">
        <input type="range" class="page-slider" [min]="1" [max]="totalPages" [value]="page"
          (input)="onSliderChange($event)" list="pdf-page-ticks" [title]="'readerPdf.footer.pageSlider' | transloco" />
        <datalist id="pdf-page-ticks">
          @for (tick of sliderTicks; track tick) {
          <option [value]="tick"></option>
          }
        </datalist>
      </div>

      <div class="goto-page">
        <input type="number" [(ngModel)]="goToPageInput" [min]="1" [max]="totalPages"
          [placeholder]="'readerPdf.footer.pagePlaceholder' | transloco" class="page-input"
          (keyup.enter)="onGoToPage()" />
        <button class="go-btn" (click)="onGoToPage()"
          [disabled]="goToPageInput === null || goToPageInput < 1 || goToPageInput > totalPages">
          {{ 'readerPdf.footer.go' | transloco }}
        </button>
      </div>
    </div>

    <div class="footer-spacer"></div>

    <div class="viewer-mode-toggle">
      <button class="toggle-btn toggle-book" [class.active]="viewerMode === 'book'" (click)="setViewerMode('book')">
        <i class="pi pi-book"></i><span>Book Viewer</span>
      </button>
      <button class="toggle-btn toggle-doc" [class.active]="viewerMode === 'document'" (click)="setViewerMode('document')">
        <i class="pi pi-file"></i><span>Doc Viewer</span>
      </button>
    </div>
  </div>

</div>
}
