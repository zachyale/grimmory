<ng-container *transloco="let t; prefix: 'dashboard.scroller'">
  <div class="dashboard-scroller-container">
    <h2 class="dashboard-scroller-title">
      {{ title | transloco }}
      @if (isMagicShelf) {
        <i class="pi pi-sparkles magic-shelf-icon"></i>
      }
    </h2>

    @if (!books || books.length === 0) {
      <div class="dashboard-scroller-no-books">
        <div class="empty-state-icon">
          <i class="pi pi-book"></i>
        </div>
        <p>{{ t('noBooksFound') }}</p>
      </div>
    }

    @if (books && books.length > 0) {
      <div class="dashboard-scroller-strip">
        @for (book of books; track book.id; let i = $index) {
          <div class="dashboard-scroller-card" [ngClass]="{'square-card': useSquareCovers}">
            <app-book-card
              [book]="book"
              [index]="i"
              [forceEbookMode]="forceEbookMode"
              [useSquareCovers]="useSquareCovers"
              [overlayPreferenceService]="overlayPreferenceService">
            </app-book-card>
          </div>
        }
      </div>
    }

    @if (books === null) {
      <div class="dashboard-scroller-error">
        <div class="error-icon">
          <i class="pi pi-exclamation-triangle"></i>
        </div>
        <p>{{ t('loadError') }}</p>
      </div>
    }
  </div>
</ng-container>
