app:
  path-config: '/app/data'
  bookdrop-folder: '/bookdrop'
  version: ${APP_VERSION:development}

  cors:
    # Comma-separated list of allowed CORS origins.
    # Leave empty (default) to allow same-origin requests only.
    # Example: ALLOWED_ORIGINS=https://app.example.com,https://mobile.example.com
    allowed-origins: ${ALLOWED_ORIGINS:*}

  remote-auth:
    enabled: ${REMOTE_AUTH_ENABLED:false}
    create-new-users: ${REMOTE_AUTH_CREATE_NEW_USERS:true}
    header-name: ${REMOTE_AUTH_HEADER_NAME:Remote-Name}
    header-user: ${REMOTE_AUTH_HEADER_USER:Remote-User}
    header-email: ${REMOTE_AUTH_HEADER_EMAIL:Remote-Email}
    header-groups: ${REMOTE_AUTH_HEADER_GROUPS:Remote-Groups}
    admin-group: ${REMOTE_AUTH_ADMIN_GROUP}
    groups-delimiter: ${REMOTE_AUTH_GROUPS_DELIMITER:\\s+}
  force-disable-oidc: ${FORCE_DISABLE_OIDC:false}
  disk-type: ${DISK_TYPE:LOCAL}

server:
  max-http-header-size: 128KB
  forward-headers-strategy: native
  port: ${BOOKLORE_PORT:6060}
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json,image/svg+xml,application/xml,application/atom+xml
    min-response-size: 1024
  tomcat:
    relaxed-query-chars: '[,],%,{,},|'
    threads:
      max: 20                      # Virtual threads handle concurrency; platform threads just overhead
      min-spare: 4

spring:
  jackson:
    deserialization:
      fail-on-null-for-primitives: false
  servlet:
    multipart:
      enabled: false
  mvc:
    async:
      request-timeout: 600000
  application:
    name: booklore-api
  data:
    web:
      pageable:
        max-page-size: 100
  datasource:
    url: ${DATABASE_URL:jdbc:mariadb://${DATABASE_HOST:${DB_HOST:mariadb}}:${DATABASE_PORT:3306}/${DATABASE_NAME:booklore}?createDatabaseIfNotExist=true&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:${MYSQL_ROOT_PASSWORD}}
    hikari:
      pool-name: BookloreHikariPool
      max-lifetime: 580000         # 9.6 minutes (avoid DB-side connection cuts)
      connection-test-query: SELECT 1
      connection-timeout: 30000    # 30s to acquire a connection before timeout
      maximum-pool-size: 10        # Virtual threads don't need large pools
      minimum-idle: 2              # Minimal warm connections; virtual threads handle bursts
      idle-timeout: 300000         # 5 minutes before idle connections are closed
  jpa:
    open-in-view: true # true until we implement proper DTOs and service-layer data fetching
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        query:
          timeout: 30              # 30s max for any HQL/JPQL query
          plan_cache_max_size: 256 # Reduce from 2048 default; ~200 unique queries max
          in_clause_parameter_padding: true  # Pad IN params to power-of-2; fewer unique plan cache entries
        jdbc:
          time_zone: UTC
          batch_size: 500
          fetch_size: 50           # Reduce JDBC roundtrips for large result sets
          order_inserts: true
          order_updates: true
          batch_versioned_data: true  # Allow batching UPDATEs on @Version entities
        default_batch_fetch_size: 16  # Global batch fetch for all lazy collections (prevents N+1)
        generate_statistics: ${HIBERNATE_STATISTICS:false}
  threads:
    virtual:
      enabled: true
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: ${ROOT_LOG_LEVEL:INFO}
    org.booklore: ${LOG_LEVEL:INFO}
    org.apache.fontbox: ERROR
    org.apache.pdfbox: ERROR
    org.quartz.core.QuartzScheduler: WARN
    org.quartz.simpl.SimpleThreadPool: WARN
    org.quartz.simpl.RAMJobStore: WARN
    org.hibernate.orm.connections.pooling: WARN
    org.hibernate.session.metrics: ${HIBERNATE_METRICS_LOG_LEVEL:WARN}
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
