name: Nightly - Build and Publish

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  resolve_ref:
    name: Resolve Nightly Ref
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    outputs:
      base_tag: ${{ steps.resolve.outputs.base_tag }}
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
      from_ref: ${{ steps.resolve.outputs.from_ref }}
      nightly_tag: ${{ steps.resolve.outputs.nightly_tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: develop

      - name: Record Resolved Commit
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu

          git fetch origin main --tags --force
          short_sha="$(git rev-parse --short HEAD)"
          build_date="$(date -u +%Y%m%d)"
          nightly_tag="nightly-${build_date}-${short_sha}"
          base_tag="$(git describe --tags --abbrev=0 --match 'v*' origin/main)"
          from_ref="$base_tag"
          previous_nightly_sha=""
          if previous_nightly_json="$(
            gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/publish-nightly.yml/runs?branch=develop&event=schedule&status=success&per_page=1"
          )"; then
            previous_nightly_sha="$(printf '%s' "$previous_nightly_json" | jq -r '.workflow_runs[0].head_sha // ""')"
          else
            echo "::warning::Unable to resolve previous nightly run; using ${base_tag}"
          fi

          if [ -n "$previous_nightly_sha" ] \
            && git rev-parse --verify --quiet "${previous_nightly_sha}^{commit}" >/dev/null \
            && git merge-base --is-ancestor "$previous_nightly_sha" HEAD; then
            from_ref="$previous_nightly_sha"
          elif [ -n "$previous_nightly_sha" ]; then
            echo "::warning::Ignoring unusable nightly baseline ${previous_nightly_sha}; using ${base_tag}"
          fi

          echo "base_tag=${base_tag}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "from_ref=${from_ref}" >> "$GITHUB_OUTPUT"
          echo "nightly_tag=${nightly_tag}" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and Push Nightly Image
    needs: [resolve_ref, test-suite]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.record.outputs.image_tag }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          ref: ${{ needs.resolve_ref.outputs.commit_sha }}

      - name: Record Nightly Build Metadata
        id: record
        env:
          NIGHTLY_TAG: ${{ needs.resolve_ref.outputs.nightly_tag }}
        run: |
          echo "image_tag=${NIGHTLY_TAG}" >> "$GITHUB_OUTPUT"
          echo "nightly_tag=${NIGHTLY_TAG}" >> "$GITHUB_ENV"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "Nightly tag: ${NIGHTLY_TAG}"

      - name: Set Up QEMU for Multi-Arch Builds
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          cache-image: false

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Authenticate to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            grimmory/grimmory:${{ env.nightly_tag }}
            grimmory/grimmory:nightly
            ghcr.io/grimmory-tools/grimmory:${{ env.nightly_tag }}
            ghcr.io/grimmory-tools/grimmory:nightly
          build-args: |
            APP_VERSION=${{ env.nightly_tag }}
            APP_REVISION=${{ env.commit_sha }}
          cache-from: |
            type=gha,scope=image-shared
            type=registry,ref=ghcr.io/grimmory-tools/grimmory:buildcache
          cache-to: |
            type=gha,scope=image-shared,mode=max
            type=registry,ref=ghcr.io/grimmory-tools/grimmory:buildcache,mode=max

  generate-notes:
    name: Nightly Changelog
    if: ${{ always() && needs.test-suite.result == 'success' }}
    needs: [resolve_ref, test-suite]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      compare_url: ${{ steps.notes.outputs.compare_url }}
      details_url: ${{ steps.notes.outputs.details_url }}
      predicted_version: ${{ steps.notes.outputs.predicted_version }}
      release_notes: ${{ steps.notes.outputs.release_notes }}
      release_type: ${{ steps.notes.outputs.release_type }}
      released: ${{ steps.notes.outputs.released }}
      to_sha: ${{ steps.notes.outputs.to_sha }}
    steps:
      - name: Checkout Workflow Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Build Full Changelog
        id: notes
        uses: ./.github/actions/compute-release-notes
        with:
          base_tag: ${{ needs.resolve_ref.outputs.base_tag }}
          from_ref: ${{ needs.resolve_ref.outputs.from_ref }}
          repository_url: ${{ format('{0}/{1}', github.server_url, github.repository) }}
          to_ref: ${{ needs.resolve_ref.outputs.commit_sha }}

  notify-discord:
    name: Notify Discord (Nightly)
    if: ${{ always() && needs.generate-notes.result == 'success' && needs.build-and-push.result == 'success' }}
    needs: [resolve_ref, build-and-push, generate-notes]
    permissions: {}
    uses: ./.github/workflows/notify-discord-release-notes.yml
    secrets:
      discord_webhook: ${{ secrets.DISCORD_NIGHTLY_WEBHOOK != '' && secrets.DISCORD_NIGHTLY_WEBHOOK || secrets.DISCORD_RELEASE_WEBHOOK }}
    with:
      channel: nightly
      candidate_sha: ${{ needs.resolve_ref.outputs.commit_sha }}
      base_tag: ${{ needs.resolve_ref.outputs.base_tag }}
      current_version: ${{ needs.resolve_ref.outputs.nightly_tag }}
      details_url: ${{ needs.generate-notes.outputs.details_url }}
      compare_url: ${{ needs.generate-notes.outputs.compare_url }}
      mention_text: ${{ vars.DISCORD_NIGHTLY_MENTIONS }}
      predicted_version: ${{ needs.generate-notes.outputs.predicted_version }}

  test-suite:
    name: Test Suite
    needs: [resolve_ref]
    uses: ./.github/workflows/test-suite.yml
    permissions:
      contents: read
      checks: write
    with:
      checkout_ref: ${{ needs.resolve_ref.outputs.commit_sha }}
      save_gradle_cache: true
