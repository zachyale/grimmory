name: Release - Candidate

on:
  workflow_dispatch:
    inputs:
      candidate_ref:
        description: 'Branch, tag, or commit SHA to build as a release candidate'
        required: false
        default: develop
        type: string
      run_tests:
        description: 'Run the full test suite before publishing and notifying'
        required: false
        default: true
        type: boolean
      publish_image:
        description: 'Build and publish RC container images'
        required: false
        default: true
        type: boolean

concurrency:
  group: release-candidate
  cancel-in-progress: false

jobs:
  resolve_ref:
    name: Resolve Candidate Ref
    runs-on: ubuntu-latest

    outputs:
      candidate_sha: ${{ steps.resolve.outputs.candidate_sha }}
      rc_tag: ${{ steps.resolve.outputs.rc_tag }}
      base_tag: ${{ steps.resolve.outputs.base_tag }}
      compare_url: ${{ steps.resolve.outputs.compare_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.candidate_ref }}

      - name: Resolve Candidate Metadata
        id: resolve
        run: |
          set -eu

          git fetch origin main --tags --force

          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "Selected ref does not contain origin/main and cannot be promoted cleanly to main" >&2
            exit 1
          fi

          candidate_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short HEAD)"
          build_date="$(date -u +%Y%m%d)"
          rc_tag="rc-${build_date}-${short_sha}"
          base_tag="$(git describe --tags --abbrev=0 --match 'v*' origin/main)"
          compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${base_tag}...${candidate_sha}"

          echo "candidate_sha=${candidate_sha}" >> "$GITHUB_OUTPUT"
          echo "rc_tag=${rc_tag}" >> "$GITHUB_OUTPUT"
          echo "base_tag=${base_tag}" >> "$GITHUB_OUTPUT"
          echo "compare_url=${compare_url}" >> "$GITHUB_OUTPUT"

          {
            echo "## Release Candidate Candidate"
            echo
            echo "- Candidate ref input: \`${{ inputs.candidate_ref }}\`"
            echo "- Candidate SHA: \`${candidate_sha}\`"
            echo "- Base stable tag: \`${base_tag}\`"
            echo "- Compare: ${compare_url}"
            echo "- RC image tag: \`${rc_tag}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  test-suite:
    name: Test Suite
    if: ${{ inputs.run_tests }}
    needs: [resolve_ref]
    uses: ./.github/workflows/test-suite.yml
    permissions:
      contents: read
      checks: write
    with:
      checkout_ref: ${{ needs.resolve_ref.outputs.candidate_sha }}
      save_gradle_cache: true

  build-and-push:
    name: Build and Push RC Image
    if: ${{ inputs.publish_image && (needs.test-suite.result == 'success' || needs.test-suite.result == 'skipped') }}
    needs: [resolve_ref, test-suite]
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.record.outputs.image_tag }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          ref: ${{ needs.resolve_ref.outputs.candidate_sha }}

      - name: Record RC Build Metadata
        id: record
        run: |
          echo "image_tag=${{ needs.resolve_ref.outputs.rc_tag }}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Set Up QEMU for Multi-Arch Builds
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          cache-image: false

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Authenticate to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push RC Docker Image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            grimmory/grimmory:${{ needs.resolve_ref.outputs.rc_tag }}
            grimmory/grimmory:rc
            ghcr.io/grimmory-tools/grimmory:${{ needs.resolve_ref.outputs.rc_tag }}
            ghcr.io/grimmory-tools/grimmory:rc
          build-args: |
            APP_VERSION=${{ needs.resolve_ref.outputs.rc_tag }}
            APP_REVISION=${{ env.commit_sha }}
          cache-from: |
            type=gha,scope=image-shared
            type=registry,ref=ghcr.io/grimmory-tools/grimmory:buildcache
          cache-to: |
            type=gha,scope=image-shared,mode=max
            type=registry,ref=ghcr.io/grimmory-tools/grimmory:buildcache,mode=max

  generate-notes:
    name: Generate RC Semantic Notes
    if: ${{ needs.test-suite.result == 'success' || needs.test-suite.result == 'skipped' }}
    needs: [resolve_ref, test-suite]
    runs-on: ubuntu-latest

    outputs:
      predicted_version: ${{ steps.extract.outputs.predicted_version }}
      release_notes: ${{ steps.extract.outputs.release_notes }}

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve_ref.outputs.candidate_sha }}

      - name: Prepare Candidate as Main Preview
        run: |
          set -eu
          git fetch origin main --tags --force
          git checkout -B main "${{ needs.resolve_ref.outputs.candidate_sha }}"

      - name: Install just
        uses: taiki-e/install-action@7627fb428e65e78e2ec9a24ae5c5bd5f8553f182 # v2.69.10
        with:
          tool: just

      - name: Set Up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'

      - name: Enable Corepack
        run: |
          corepack enable
          corepack yarn --version

      - name: Install Release Tooling Dependencies
        run: just release install

      - name: Generate Preview Notes
        run: |
          PREVIEW_BRANCH=main PREVIEW_OUTPUT_JSON=preview-release.json PREVIEW_OUTPUT_NOTES=preview-release-notes.md just release preview-notes

      - name: Extract Preview Data
        id: extract
        run: |
          set -eu
          predicted_version="$(jq -r '.nextVersion // empty' preview-release.json)"
          if [ -z "$predicted_version" ] || [ "$predicted_version" = "null" ]; then
            predicted_version="no-release"
          fi

          {
            echo "predicted_version=${predicted_version}"
            echo "release_notes<<EOF"
            cat preview-release-notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Preview Notes Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-candidate-preview-notes
          path: |
            preview-release.json
            preview-release-notes.md
          retention-days: 14

  notify-discord:
    name: Notify Discord (RC)
    if: ${{ needs.generate-notes.result == 'success' && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') }}
    needs: [resolve_ref, build-and-push, generate-notes]
    uses: ./.github/workflows/notify-discord-release-notes.yml
    secrets:
      discord_webhook: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
    with:
      channel: rc
      candidate_sha: ${{ needs.resolve_ref.outputs.candidate_sha }}
      base_tag: ${{ needs.resolve_ref.outputs.base_tag }}
      predicted_version: ${{ needs.generate-notes.outputs.predicted_version }}
      release_notes: ${{ needs.generate-notes.outputs.release_notes }}
      compare_url: ${{ needs.resolve_ref.outputs.compare_url }}
      image_tag: ${{ needs.build-and-push.outputs.image_tag }}
