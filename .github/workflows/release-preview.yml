name: Release - Dry Run Preview

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref or commit to preview as the next stable release candidate promoted onto main'
        required: false
        default: develop
        type: string

jobs:
  preview:
    name: Preview Next Stable Release
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Prepare Stable Release Preview
        run: |
          set -eu

          git fetch origin main --tags --force

          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "Selected ref does not contain origin/main and cannot be promoted cleanly to main" >&2
            exit 1
          fi

          echo "Previewing release candidate range origin/main..HEAD"
          {
            echo "## Stable Release Preview"
            echo
            echo "- Base branch: \`main\`"
            echo "- Candidate ref: \`$(git rev-parse --short HEAD)\`"
            echo "- Range: \`origin/main..HEAD\`"
            echo
            echo "### Included Commits"
            git log --reverse --no-merges --pretty='- %h %s' origin/main..HEAD || true
          } >> "$GITHUB_STEP_SUMMARY"

          git checkout -B main "$(git rev-parse HEAD)"

      - name: Install just
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: just

      - name: Set Up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Enable Corepack
        run: |
          corepack enable
          corepack yarn --version

      - name: Install Release Tooling Dependencies
        run: just release install

      - name: Run semantic-release Dry Run
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN != '' && secrets.RELEASE_BOT_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN != '' && secrets.RELEASE_BOT_TOKEN || github.token }}
        run: just release preview | tee semantic-release-preview.log

      - name: Upload Preview Output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semantic-release-preview
          path: semantic-release-preview.log
          retention-days: 14
