name: Reusable - Test Suite

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: 'The ref to check out before running tests'
        required: true
        type: string
      publish_test_results:
        description: 'Whether to publish test results directly from this workflow'
        required: false
        type: boolean
        default: true
      save_gradle_cache:
        description: 'Whether this run should persist the shared Gradle cache'
        required: false
        type: boolean
        default: false

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_ref }}

      - name: Install just
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: just

      - name: Set Up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Restore Gradle Cache
        id: restore_gradle_cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('backend/**/*.gradle*', 'backend/settings.gradle*', 'backend/gradle.properties', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Needed for NightCompress
      - name: Install libarchive
        run: |
          sudo apt-get update 
          sudo apt-get install libarchive-dev --yes

          # Place libarchive somewhere that java looks for it.
          sudo mkdir -p /usr/java/packages/lib/
          sudo cp /usr/lib/x86_64-linux-gnu/libarchive.* /usr/java/packages/lib/

      - name: Execute Backend Tests
        id: backend_tests
        run: |
          echo "Running backend tests..."
          just api test
        continue-on-error: true

      - name: Publish Backend Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        if: ${{ always() && inputs.publish_test_results }}
        with:
          files: backend/build/test-results/**/*.xml
          check_name: Backend Test Results

      - name: Upload Backend Test Reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: backend-test-reports
          path: |
            backend/build/reports/tests/
            backend/build/test-results/
          retention-days: 30

      - name: Save Gradle Cache
        if: ${{ always() && inputs.save_gradle_cache }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ steps.restore_gradle_cache.outputs.cache-primary-key }}

      - name: Validate Backend Test Results
        if: steps.backend_tests.outcome == 'failure'
        run: |
          echo "❌ Backend tests failed"
          exit 1

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_ref }}

      - name: Install just
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: just

      - name: Set Up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Enable Corepack
        run: |
          corepack enable
          corepack yarn --version

      - name: Install Frontend Dependencies
        run: just ui install-ci

      - name: Audit Frontend Dependencies
        run: just ui audit-ci

      - name: Validate Dependency Tree
        run: just ui deps

      - name: Execute Frontend Tests
        id: frontend_tests
        run: |
          echo "Running frontend tests..."
          just ui test
        continue-on-error: true

      - name: Publish Frontend Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        if: ${{ always() && inputs.publish_test_results }}
        with:
          files: frontend/test-results/vitest-results.xml
          check_name: Frontend Test Results

      - name: Upload Frontend Test Reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: frontend-test-reports
          path: |
            frontend/test-results/vitest-results.xml
          retention-days: 30

      - name: Validate Frontend Test Results
        if: steps.frontend_tests.outcome == 'failure'
        run: |
          echo "❌ Frontend tests failed"
          exit 1
