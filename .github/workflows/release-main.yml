name: Release - Semantic Stable

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  migration-check:
    name: Flyway Migration Check
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    uses: ./.github/workflows/migrations-check.yml
    with:
      base_ref: ${{ github.event.before }}
      head_ref: ${{ github.sha }}
      checkout_ref: ${{ github.sha }}

  test-suite:
    name: Test Suite
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    needs: [migration-check]
    uses: ./.github/workflows/test-suite.yml
    permissions:
      contents: read
      checks: write
    with:
      checkout_ref: ${{ github.sha }}
      save_gradle_cache: true

  semantic-release:
    name: Compute Release, Update Changelog, and Draft GitHub Release
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    needs: [migration-check, test-suite]
    runs-on: ubuntu-latest

    outputs:
      released: ${{ steps.release_state.outputs.released }}
      release_tag: ${{ steps.release_state.outputs.release_tag }}
      release_sha: ${{ steps.release_state.outputs.release_sha }}

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install just
        uses: taiki-e/install-action@a1df9120380005ebdc788c62449b841b205541dd # v2.71.0
        with:
          tool: just

      - name: Set Up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'

      - name: Enable Corepack
        run: |
          corepack enable
          corepack yarn --version

      - name: Install Release Tooling Dependencies
        run: just release install

      - name: Record Pre-Release HEAD
        id: pre_release
        run: |
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure Release Bot Git Identity
        env:
          RELEASE_GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN != '' && secrets.RELEASE_BOT_TOKEN || github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN != '' && secrets.RELEASE_BOT_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN != '' && secrets.RELEASE_BOT_TOKEN || github.token }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: just release run

      - name: Capture Release State
        id: release_state
        run: |
          set -eu
          head_before="${{ steps.pre_release.outputs.head_sha }}"
          head_after="$(git rev-parse HEAD)"

          echo "release_sha=$head_after" >> "$GITHUB_OUTPUT"

          if [ "$head_after" = "$head_before" ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          release_tag="$(git tag --points-at "$head_after" 'v*' | sort -V | tail -n 1)"

          if [ -z "$release_tag" ]; then
            echo "semantic-release advanced HEAD without creating a release tag" >&2
            exit 1
          fi

          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

  publish-release:
    name: Publish Stable Images
    if: ${{ needs.semantic-release.outputs.released == 'true' }}
    needs: [semantic-release]
    uses: ./.github/workflows/publish-release.yml
    permissions:
      contents: write
      packages: write
    secrets: inherit
    with:
      release_tag: ${{ needs.semantic-release.outputs.release_tag }}
      commit_sha: ${{ needs.semantic-release.outputs.release_sha }}

  prepare-release-notification:
    name: Prepare Stable Release Notification
    if: ${{ needs.semantic-release.outputs.released == 'true' && needs.publish-release.result == 'success' }}
    needs: [semantic-release, publish-release]
    runs-on: ubuntu-latest

    outputs:
      base_tag: ${{ steps.metadata.outputs.base_tag }}
      compare_url: ${{ steps.metadata.outputs.compare_url }}
      release_url: ${{ steps.metadata.outputs.release_url }}
      release_notes: ${{ steps.metadata.outputs.release_notes }}
      release_version: ${{ steps.metadata.outputs.release_version }}

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.semantic-release.outputs.release_sha }}

      - name: Extract Stable Release Metadata
        id: metadata
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN != '' && secrets.RELEASE_BOT_TOKEN || github.token }}
          RELEASE_TAG: ${{ needs.semantic-release.outputs.release_tag }}
        run: |
          set -eu

          git fetch origin main --tags --force

          release_json="$(gh release view "$RELEASE_TAG" --json body,url)"
          release_version="${RELEASE_TAG#v}"
          base_tag="$(git tag --sort=-version:refname 'v*' | grep -Fxv "$RELEASE_TAG" | head -n 1 || true)"
          compare_url=""
          release_url="$(printf '%s' "$release_json" | jq -r '.url')"
          if [ -n "$base_tag" ]; then
            compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${base_tag}...${RELEASE_TAG}"
          fi

          {
            echo "base_tag=${base_tag}"
            echo "compare_url=${compare_url}"
            echo "release_url=${release_url}"
            echo "release_version=${release_version}"
            echo "release_notes<<EOF"
            printf '%s' "$release_json" | jq -r '.body'
            printf '\n'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  notify-discord:
    name: Notify Discord (Stable)
    if: ${{ needs.semantic-release.outputs.released == 'true' && needs.publish-release.result == 'success' && needs.prepare-release-notification.result == 'success' }}
    needs: [semantic-release, publish-release, prepare-release-notification]
    permissions: {}
    uses: ./.github/workflows/notify-discord-release-notes.yml
    secrets:
      discord_webhook: ${{ secrets.DISCORD_STABLE_WEBHOOK != '' && secrets.DISCORD_STABLE_WEBHOOK || secrets.DISCORD_RELEASE_WEBHOOK }}
    with:
      channel: stable
      candidate_sha: ${{ needs.semantic-release.outputs.release_sha }}
      base_tag: ${{ needs.prepare-release-notification.outputs.base_tag }}
      current_version: ${{ needs.semantic-release.outputs.release_tag }}
      details_url: ${{ needs.prepare-release-notification.outputs.release_url }}
      compare_url: ${{ needs.prepare-release-notification.outputs.compare_url }}
      mention_text: ${{ vars.DISCORD_STABLE_MENTIONS }}
      predicted_version: ${{ needs.prepare-release-notification.outputs.release_version }}

  backport-release:
    name: Backport Release Commit to Develop
    if: ${{ needs.semantic-release.outputs.released == 'true' && needs.publish-release.result == 'success' }}
    needs: [semantic-release, publish-release]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Release Bot Git Identity
        env:
          RELEASE_GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN != '' && secrets.RELEASE_BOT_TOKEN || github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Cherry-pick Release Commit onto Develop
        env:
          RELEASE_SHA: ${{ needs.semantic-release.outputs.release_sha }}
          RELEASE_TAG: ${{ needs.semantic-release.outputs.release_tag }}
        run: |
          set -eu
          release_version="${RELEASE_TAG#v}"

          git fetch origin main develop --tags
          git checkout -B develop origin/develop

          if git log --format=%s origin/develop | grep -Fxq "chore(release): ${release_version} [skip ci]"; then
            echo "Develop already contains the release commit for ${RELEASE_TAG}; skipping backport."
            exit 0
          fi

          git cherry-pick -x "$RELEASE_SHA"
          git push origin HEAD:develop
