name: Release - Semantic Stable

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  migration-check:
    name: Flyway Migration Check
    uses: ./.github/workflows/migrations-check.yml
    with:
      base_ref: ${{ github.event.before }}
      head_ref: ${{ github.sha }}
      checkout_ref: ${{ github.sha }}

  test-suite:
    name: Test Suite
    needs: [migration-check]
    uses: ./.github/workflows/test-suite.yml
    permissions:
      contents: read
      checks: write
    with:
      checkout_ref: ${{ github.sha }}
      save_gradle_cache: true

  semantic-release:
    name: Compute Release, Update Changelog, and Draft GitHub Release
    needs: [migration-check, test-suite]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install just
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: just

      - name: Set Up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'

      - name: Enable Corepack
        run: |
          corepack enable
          corepack yarn --version

      - name: Install Release Tooling Dependencies
        run: just release install

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN != '' && secrets.RELEASE_BOT_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN != '' && secrets.RELEASE_BOT_TOKEN || github.token }}
        run: just release run
